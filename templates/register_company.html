{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Company Registration</h2>

<div class="card p-4">

<form method="POST">

<input name="name" class="form-control mb-3" placeholder="Company Name" required>
<input name="email" class="form-control mb-3" placeholder="Company Email" required>
<input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
<input name="hr_contact" class="form-control mb-3" placeholder="HR Contact">
<input name="website" class="form-control mb-3" placeholder="Website">

<button class="btn btn-success w-100">
Register
</button>

</form>
</div>

{% endblock %}
