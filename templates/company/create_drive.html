{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">Create Placement Drive</h2>

<div class="card p-4">

<form method="POST">

<input name="job_title" class="form-control mb-3" placeholder="Job Title">

<textarea name="job_description" class="form-control mb-3" placeholder="Job Description"></textarea>

<input name="eligibility" class="form-control mb-3" placeholder="Eligibility Criteria">

<input type="date" name="deadline" class="form-control mb-3">

<button class="btn btn-primary">
Create Drive
</button>

</form>
</div>

{% endblock %}
